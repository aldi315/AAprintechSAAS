version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/invit_db?schema=public
      - NEXTAUTH_SECRET=my_super_secret_for_nextauth
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db
    networks:
      - invit_network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=invit_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - invit_network

volumes:
  pgdata:

networks:
  invit_network:
    driver: bridge
